# Pings IndexNow after pushes to main (Bing, Yandex, partners).
# Optional: add repo secret INDEXNOW_KEY if you rotate the key; otherwise the
# default key file a1b2c3d4e5f6g7h8.txt must exist in public/.

name: IndexNow ping

on:
  push:
    branches: [main]

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Submit URLs to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/indexnow-ping.mjs
